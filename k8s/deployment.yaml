apiVersion: v1
kind: Namespace
metadata:
  name: molen
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: molen-config
  namespace: molen
data:
  KAFKA_BROKERS: "redpanda:9092"
  REDIS_URL: "redis://redis:6379"
  S3_ENDPOINT: "http://minio:9000"
  ES_URL: "http://elasticsearch:9200"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: molen-api
  namespace: molen
spec:
  replicas: 3
  selector:
    matchLabels:
      app: molen-api
  template:
    metadata:
      labels:
        app: molen-api
    spec:
      containers:
      - name: api
        image: ghcr.io/sayyidyofa/molen-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          value: "postgresql://molen:molen@postgres:5432/molen"
        envFrom:
        - configMapRef:
            name: molen-config
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: molen-api
  namespace: molen
spec:
  selector:
    app: molen-api
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: molen-worker
  namespace: molen
spec:
  replicas: 5
  selector:
    matchLabels:
      app: molen-worker
  template:
    metadata:
      labels:
        app: molen-worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/sayyidyofa/molen-worker:latest
        envFrom:
        - configMapRef:
            name: molen-config
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: molen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/sayyidyofa/molen-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: molen
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
