name: Integration Tests

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'packages/core/src/clients/**'
      - 'packages/core/tests/integration/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/core/src/clients/**'
      - 'packages/core/tests/integration/**'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd packages/core
          bun install

      - name: Run Integration Tests
        env:
          # Elasticsearch credentials
          ELASTIC_URL: ${{ secrets.ELASTIC_URL }}
          ELASTIC_USERNAME: ${{ secrets.ELASTIC_USERNAME }}
          ELASTIC_PASSWORD: ${{ secrets.ELASTIC_PASSWORD }}
          
          # Flink credentials with Cloudflare Access
          FLINK_URL: ${{ secrets.FLINK_URL }}
          FLINK_CLIENT_ID: ${{ secrets.FLINK_CLIENT_ID }}
          FLINK_CLIENT_SECRET: ${{ secrets.FLINK_CLIENT_SECRET }}
          
          # Redis connection string
          REDIS_URL: ${{ secrets.REDIS_URL }}
          
          # S3-compatible storage (Cloudflare R2)
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          
          # Redpanda broker (Kafka API)
          REDPANDA_BROKERS: ${{ secrets.REDPANDA_BROKERS }}
          REDPANDA_USERNAME: ${{ secrets.REDPANDA_USERNAME }}
          REDPANDA_PASSWORD: ${{ secrets.REDPANDA_PASSWORD }}
          REDPANDA_SASL_MECHANISM: ${{ secrets.REDPANDA_SASL_MECHANISM }}
        run: |
          cd packages/core
          bun test tests/integration

      - name: Report test results
        if: always()
        run: echo "Integration tests completed"
