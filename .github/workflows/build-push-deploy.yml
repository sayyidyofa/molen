name: Build, Push, and Deploy to Kubernetes

on:
  push:
    branches: [main, copilot/define-fraud-ops-control-plane]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}-api
  IMAGE_NAME_UI: ${{ github.repository }}-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for API
      id: meta-api
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./packages/api/Dockerfile
        push: true
        tags: ${{ steps.meta-api.outputs.tags }}
        labels: ${{ steps.meta-api.outputs.labels }}
    
    - name: Extract metadata for UI
      id: meta-ui
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push UI image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./packages/ui/Dockerfile
        push: true
        tags: ${{ steps.meta-ui.outputs.tags }}
        labels: ${{ steps.meta-ui.outputs.labels }}

  deploy-to-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/copilot/define-fraud-ops-control-plane'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl for OpenShift
      env:
        KUBE_API_URL: ${{ secrets.KUBERNETES_API_ENDPOINT }}
        KUBE_TOKEN: ${{ secrets.KUBERNETES_API_TOKEN }}
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        mkdir -p $HOME/.kube
        kubectl config set-cluster openshift \
          --server=$KUBE_API_URL \
          --insecure-skip-tls-verify=true
        kubectl config set-credentials deployer \
          --token=$KUBE_TOKEN
        kubectl config set-context openshift \
          --cluster=openshift \
          --user=deployer \
          --namespace=$KUBE_NAMESPACE
        kubectl config use-context openshift
    
    - name: Create namespace if not exists
      env:
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Create or update secrets
      env:
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        kubectl create secret generic molen-secrets \
          --namespace=$KUBE_NAMESPACE \
          --from-literal=ELASTIC_URL='${{ secrets.ELASTIC_URL }}' \
          --from-literal=ELASTIC_USERNAME='${{ secrets.ELASTIC_USERNAME }}' \
          --from-literal=ELASTIC_PASSWORD='${{ secrets.ELASTIC_PASSWORD }}' \
          --from-literal=REDIS_URL='${{ secrets.REDIS_URL }}' \
          --from-literal=S3_ENDPOINT='${{ secrets.S3_ENDPOINT }}' \
          --from-literal=S3_ACCESS_KEY_ID='${{ secrets.S3_ACCESS_KEY_ID }}' \
          --from-literal=S3_SECRET_ACCESS_KEY='${{ secrets.S3_SECRET_ACCESS_KEY }}' \
          --from-literal=S3_BUCKET='${{ secrets.S3_BUCKET }}' \
          --from-literal=KAFKA_BROKERS='${{ secrets.KAFKA_BROKERS }}' \
          --from-literal=KAFKA_USERNAME='${{ secrets.KAFKA_USERNAME }}' \
          --from-literal=KAFKA_PASSWORD='${{ secrets.KAFKA_PASSWORD }}' \
          --from-literal=KAFKA_SASL_MECHANISM='${{ secrets.KAFKA_SASL_MECHANISM }}' \
          --dry-run=client -o yaml | kubectl apply -f -
    
    - name: Deploy ConfigMap
      env:
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        kubectl apply -f k8s/configmap.yaml --namespace=$KUBE_NAMESPACE
    
    - name: Deploy API
      env:
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        kubectl apply -f k8s/api-deployment.yaml --namespace=$KUBE_NAMESPACE
        kubectl apply -f k8s/api-service.yaml --namespace=$KUBE_NAMESPACE
    
    - name: Deploy UI
      env:
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        kubectl apply -f k8s/ui-deployment.yaml --namespace=$KUBE_NAMESPACE
        kubectl apply -f k8s/ui-service.yaml --namespace=$KUBE_NAMESPACE
    
    - name: Wait for deployments
      env:
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        kubectl rollout status deployment/molen-api --namespace=$KUBE_NAMESPACE --timeout=5m
        kubectl rollout status deployment/molen-ui --namespace=$KUBE_NAMESPACE --timeout=5m
    
    - name: Get deployment status
      env:
        KUBE_NAMESPACE: ${{ secrets.KUBERNETES_NAMESPACE }}
      run: |
        echo "=== Deployments ==="
        kubectl get deployments --namespace=$KUBE_NAMESPACE
        echo ""
        echo "=== Pods ==="
        kubectl get pods --namespace=$KUBE_NAMESPACE
        echo ""
        echo "=== Services ==="
        kubectl get services --namespace=$KUBE_NAMESPACE
