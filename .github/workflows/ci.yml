name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, copilot/define-fraud-ops-control-plane ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - run: cargo test --all-features
      - run: cargo clippy -- -D warnings

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci && npm run test:run && npm run build

  build-push:
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/copilot/define-fraud-ops-control-plane')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        component: [api, worker, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component == 'frontend' && './frontend' || '.' }}
          file: ${{ matrix.component == 'frontend' && './frontend/Dockerfile' || format('./molen-{0}/Dockerfile', matrix.component) }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/molen-${{ matrix.component }}:latest
