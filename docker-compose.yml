services:
  molen-api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    image: molen-api:latest
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - "${CA_CERT_PATH:-./package.json}:/app/homelab.crt:ro"
    env_file:
      - .env
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@postgres:5432/molen}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ELASTIC_URL=${ELASTIC_URL:-http://elasticsearch:9200}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - KAFKA_CONNECT_URL=${KAFKA_CONNECT_URL:-http://kafka-connect:8083}
      - USE_MOCKS=${USE_MOCKS:-false}
      - CA_CERT_PATH=${CA_CERT_PATH:+/app/homelab.crt}
    restart: always

  molen-ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    image: molen-ui:latest
    ports:
      - "${UI_PORT:-80}:8080"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - molen-api
    restart: always
