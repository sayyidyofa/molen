version: '3.8'

services:
  # Molen API
  molen-api:
    build:
      context: .
      dockerfile: molen-api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://molen:molen@postgres:5432/molen
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=redpanda:9092
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - ES_URL=http://elasticsearch:9200
    depends_on:
      - postgres
      - redis
      - redpanda
      - minio
      - elasticsearch
    networks:
      - molen-network

  # Molen Worker
  molen-worker:
    build:
      context: .
      dockerfile: molen-worker/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=redpanda:9092
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - ES_URL=http://elasticsearch:9200
    depends_on:
      - redis
      - redpanda
      - minio
      - elasticsearch
    networks:
      - molen-network

  # Frontend
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - molen-api
    networks:
      - molen-network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=molen
      - POSTGRES_PASSWORD=molen
      - POSTGRES_DB=molen
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - molen-network

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - molen-network

  # Redpanda (Kafka-compatible)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.1
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=info
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - molen-network

  # MinIO (S3-compatible)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - molen-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - molen-network

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  minio-data:
  es-data:

networks:
  molen-network:
    driver: bridge
