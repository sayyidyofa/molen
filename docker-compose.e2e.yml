services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: molen_admin
      POSTGRES_PASSWORD: molen_local_secret
      POSTGRES_DB: molen_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U molen_admin -d molen_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.18
    ports:
      - "18081:8081"
      - "18082:8082"
      - "19092:19092"
      - "19644:9644"
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=info
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: molen_minio_admin
      MINIO_ROOT_PASSWORD: molen_minio_secret
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: e2e
      DATABASE_URL: postgres://molen_admin:molen_local_secret@postgres:5432/molen_db
      KAFKA_BROKERS: redpanda:9092
      MOLEN_CONTROL_TOPIC: molen_control_dev
      MOLEN_INBOUND_TOPIC: molen_transactions_in
      MOLEN_OUTBOUND_TOPIC: molen_scores_out
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: molen_minio_admin
      S3_SECRET_KEY: molen_minio_secret
      S3_BUCKET_MODELS: molen-models-dev
      API_PORT: 3000
      API_HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1))\""]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    environment:
      RUST_LOG: info
      KAFKA_BROKERS: redpanda:9092
      MOLEN_CONTROL_TOPIC: molen_control_dev
      MOLEN_INBOUND_TOPIC: molen_transactions_in
      MOLEN_OUTBOUND_TOPIC: molen_scores_out
    depends_on:
      redpanda:
        condition: service_healthy
      api:
        condition: service_healthy
